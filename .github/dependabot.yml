version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
    ignore:
      # 52.16.0 double-prefixes --base, breaking navigation on subdirectory deploys
      # (slidevjs/slidev#2622, #2629). Remove once a fixed release is out.
      - dependency-name: "@slidev/cli"
        versions: ["52.16.0"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
